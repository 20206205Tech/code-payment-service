name: CI/CD Pipeline (DB Migration)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/database/migrations/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/database/migrations/**'

jobs:
  migration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Preview Changes (Optional)
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          echo "=== Các file Migration hiện có ==="
          doppler run -p 20206205tech -c prd -- npm run migration:show

      - name: Apply Changes
        if: github.ref == 'refs/heads/main'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          echo "=== Đang chạy Migration ==="
          doppler run -p 20206205tech -c prd -- npm run migration:run
